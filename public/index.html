<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealPG - Dein Life-RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FF7F24 0%, #FF5F1F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      color: white;
      font-size: 36px;
      margin-bottom: 10px;
    }
    p {
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦊</div>
    <h1>RealPG</h1>
    <p>Dein persönliches Life-RPG für echte Selbstverbesserung. Questen, leveln, wachsen.</p>
    <div class="badge">📱 Mobile App</div>
  </div>
</body>
</html>
